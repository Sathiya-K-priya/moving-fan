<!-- 🎮 CONTROLS -->
<div class="controls">
  <button (click)="fanSpeed = 0">OFF</button>
  <button (click)="fanSpeed = 0.02">1</button>
  <button (click)="fanSpeed = 0.05">2</button>
  <button (click)="fanSpeed = 0.1">3</button>
  <button (click)="toggleLight()">🌙 Mood</button>
</div>
<!-- 3D SECTION -->
<section id="scene" class="py-5">
  <div #rendererContainer class="room-container"></div>
</section>
