<!-- 🌟 HERO / INTRO SECTION -->
<div class="hero">
  <h1>Smart Room Transformation</h1>
  <p>Real room → Interactive 3D experience</p>

  <button (click)="scrollToScene()">Watch Experience ↓</button>
</div>

<!-- 🎮 CONTROLS -->
<div class="controls">
  <button (click)="fanSpeed = 0">OFF</button>
  <button (click)="fanSpeed = 0.02">1</button>
  <button (click)="fanSpeed = 0.05">2</button>
  <button (click)="fanSpeed = 0.1">3</button>

  <button (click)="toggleLight()">🌙 Mood</button>
</div>

<!-- 🎥 3D SCENE -->
<section id="scene">
  <div #rendererContainer class="room-container"></div>
</section>

<!-- 🧾 FOOTER / CREDITS -->
<div class="footer">
  Built with Angular + Three.js
</div>
